<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram ChatBot — Kirish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #833ab4, #fd1d1d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p { color: #888; font-size: 0.85rem; margin-top: 4px; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #833ab4; }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #833ab4, #fd1d1d);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1>📱 Instagram ChatBot</h1>
      <p>Boshqaruv paneliga kirish</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Login</label>
      <input type="text" name="username" placeholder="admin" autofocus required>

      <label>Parol</label>
      <input type="password" name="password" placeholder="••••••••" required>

      <button type="submit" class="btn">Kirish</button>
    </form>
  </div>
</body>
</html>
